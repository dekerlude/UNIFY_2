<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inter-House Badminton - UNIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Patrick+Hand&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="eventspage.css">
    <style>
        .detail-container {
            max-width: 800px;
            width: 90%;
            margin-top: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--charcoal-gray);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            color: var(--pastel-lavender);
        }

        .detail-card {
            background-color: var(--mist-white);
            border: 3px solid var(--charcoal-gray);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: var(--shadow-hover);
        }

        .detail-illustration {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            display: block;
        }

        .register-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background-color: var(--soft-mint);
            border: 2px solid var(--charcoal-gray);
            border-radius: 50px;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.5rem;
            color: var(--charcoal-gray);
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .register-btn:hover {
            transform: translateY(-5px);
            box-shadow: 4px 4px 0px var(--pastel-lavender);
        }
    </style>
</head>

<body>
    <div class="background-doodles">
        <svg class="doodle trophy-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M8 21h8m-4-9v9m-8-3a2 2 0 1 1-2-2c.4 0 .9.2 1.2.5l.8.8V4a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v12.3l.8-.8c.3-.3.8-.5 1.2-.5a2 2 0 1 1-2 2"
                stroke="#EDBAA1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <svg class="doodle squiggle-2" viewBox="0 0 50 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 10 Q 12 0, 25 10 T 48 10" stroke="#EDBAA1" stroke-width="2" stroke-linecap="round"
                fill="none" />
        </svg>
    </div>
    <div class="custom-cursor"></div>
    <div class="detail-container">
        <a href="eventspage.html" class="back-link">← Back to Events</a>
        <div class="detail-card">
            <svg viewBox="0 0 100 100" class="detail-illustration">
                <ellipse cx="50" cy="50" rx="25" ry="35" stroke="#2E2E2E" stroke-width="3" />
                <circle cx="50" cy="75" r="8" fill="#9CDBC9" />
                <path d="M50 15V85" stroke="#2E2E2E" stroke-width="1" stroke-dasharray="4 4" />
                <path d="M30 50H70" stroke="#2E2E2E" stroke-width="1" stroke-dasharray="4 4" />
            </svg>
            <span class="category-tag">Sports</span>
            <h1 style="font-size: 3rem; margin: 20px 0;">Inter-House Badminton</h1>
            <div class="meta-info" style="justify-content: center; gap: 30px; margin-bottom: 30px; border: none;">
                <span class="time" style="font-size: 1.2rem;">🕒 4:00 PM Saturday</span>
                <span class="venue" style="font-size: 1.2rem;">📍 Indoor Court</span>
            </div>
            <p class="description" style="font-size: 1.1rem; max-width: 600px; margin: 0 auto;">
                Doubles Tournament Finals! Fast-paced action and incredible rallies. Who will take home the gold?
                <br><br>
                <strong>Categories:</strong> Men's Doubles, Women's Doubles, Mixed Doubles.
            </p>
            <a href="#" class="register-btn">Register Team</a>
        </div>
    </div>
    <script src="homepage.js"></script>
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <script src="homepage.js"></script>
</body>

</html>
