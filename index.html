    <header class="header">
        <h1 class="logo">UNIFY</h1>
        <p class="subtitle">All your events. One space.</p>
    </header>

    <main class="board">
        <article class="card card-events" onclick="window.location.href='eventspage.html'">
            <div class="pin"></div>
            <div class="card-content">
                <h2>Events</h2>
                <p>Discover what's happening around you.</p>
            </div>
        </article>

        <article class="card card-myspace" onclick="window.location.href='my_page.html'">
            <div class="pin"></div>
            <div class="card-content">
                <h2>My Space</h2>
                <p>Your saved events and schedule.</p>
            </div>
        </article>

        <article class="card card-feedback" onclick="window.location.href='feedbackhtml.html'">
            <div class="pin"></div>
            <div class="card-content">
                <h2>Feedback</h2>
                <p>We'd love to hear your thoughts.</p>
            </div>
        </article>

        <article class="card card-soon">
            <div class="pin"></div>
            <div class="card-content">
                <h2>Coming Soon</h2>
                <p>More exciting features on the way.</p>
            </div>
        </article>
    </main>

    <nav class="footer-nav">
        <a href="#">Home</a>
        <a href="#">Contact</a>
        <a href="login.html" style="color: var(--pastel-lavender); font-weight: bold;">Login</a>
    </nav>

    <div class="floating-shapes">
        <div class="shape circle"></div>
        <div class="shape triangle"></div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <script src="homepage.js"></script>
