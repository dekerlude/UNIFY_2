<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Carnival - UNIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Patrick+Hand&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="eventspage.css">
    <style>
        .detail-container {
            max-width: 800px;
            width: 90%;
            margin-top: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--charcoal-gray);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            color: var(--pastel-lavender);
        }

        .detail-card {
            background-color: var(--mist-white);
            border: 3px solid var(--charcoal-gray);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: var(--shadow-hover);
        }

        .detail-illustration {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            display: block;
        }

        .register-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background-color: var(--soft-mint);
            border: 2px solid var(--charcoal-gray);
            border-radius: 50px;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.5rem;
            color: var(--charcoal-gray);
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .register-btn:hover {
            transform: translateY(-5px);
            box-shadow: 4px 4px 0px var(--pastel-lavender);
        }
    </style>
</head>

<body>
    <div class="background-doodles">
        <svg class="doodle star-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.4 9.6H22.4L16 14.4L18.4 22L12 17.2L5.6 22L8 14.4L1.6 9.6H9.6L12 2Z" fill="#F3D6C6"
                opacity="0.8" />
        </svg>
        <svg class="doodle cloud-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.132 20.177 10.244 17.819 10.034C17.6 7.227 15.266 5 12.5 5C10.158 5 8.113 6.591 7.422 8.791C4.945 9.074 3 11.233 3 14C3 16.761 5.239 19 8 19H17.5Z"
                fill="#A5D0EB" fill-opacity="0.6" />
        </svg>
    </div>
    <div class="custom-cursor"></div>
    <div class="detail-container">
        <a href="eventspage.html" class="back-link">← Back to Events</a>
        <div class="detail-card">
            <svg viewBox="0 0 100 100" class="detail-illustration">
                <circle cx="50" cy="50" r="30" fill="#EDBAA1" opacity="0.6" />
                <path d="M50 20L50 80" stroke="#2E2E2E" stroke-width="2" />
                <path d="M20 50L80 50" stroke="#2E2E2E" stroke-width="2" />
                <path d="M30 30L70 70" stroke="#2E2E2E" stroke-width="2" />
                <path d="M70 30L30 70" stroke="#2E2E2E" stroke-width="2" />
            </svg>
            <span class="category-tag">Fests</span>
            <h1 style="font-size: 3rem; margin: 20px 0;">Food Carnival</h1>
            <div class="meta-info" style="justify-content: center; gap: 30px; margin-bottom: 30px; border: none;">
                <span class="time" style="font-size: 1.2rem;">🕒 5:00 PM Saturday</span>
                <span class="venue" style="font-size: 1.2rem;">📍 Open Air Theatre</span>
            </div>
            <p class="description" style="font-size: 1.1rem; max-width: 600px; margin: 0 auto;">
                A celebration of flavors! Stalls from famous city eateries and student chefs. Music, food, and fun.
                <br><br>
                <strong>Must Try:</strong> The Spicy Ramen Challenge and Churros Stall.
            </p>
            <a href="#" class="register-btn">Free Entry</a>
        </div>
    </div>
    <script src="homepage.js"></script>
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <script src="homepage.js"></script>
</body>

</html>
