    <!-- Navigation -->
    <a href="eventspage.html" class="back-arrow">← Back</a>

    <!-- Club Name (Prominent position) -->
    <div
        style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; z-index: 10;">
        <h2 style="font-size: 3rem; margin: 0; font-weight: 700;">Vibin'Z</h2>
    </div>

    <!-- Sketchy Title -->
    <h1 class="scribble-title" style="margin-top: 4rem;">
        <span>U</span><span>P</span><span>D</span><span>A</span><span>T</span><span>E</span><span>S</span>
    </h1>

    <!-- Grid of Scribble Circles -->
    <div class="events-container">

        <!-- Event 1 -->
        <div class="scribble-wrapper"
            onclick="openModal('Acoustic Sunset', 'Chill vibes and acoustic tunes. Bring your instrument or just come to listen and relax under the stars.', 'Sat, 17th Feb', '6:00 PM - 9:00 PM', 'Amphitheatre')">
            <svg class="scribble-svg" viewBox="0 0 200 200">
                <path class="scribble-path"
                    d="M30,100 C30,40 60,20 100,20 C150,20 180,50 180,100 C180,150 150,180 100,180 C50,180 20,150 20,100 C20,60 40,30 90,30 C140,30 170,60 170,110" />
                <path class="scribble-path"
                    d="M35,105 C35,45 65,25 105,25 C155,25 185,55 185,105 C185,155 155,185 105,185 C55,185 25,155 25,105"
                    opacity="0.6" style="animation-delay: 0.2s" />
            </svg>
            <div class="scribble-content">
                <h2>Acoustic Sunset</h2>
                <p>Open Mic Night.</p>
                <span class="scribble-date">Sat, 6 PM</span>
            </div>
        </div>


    </div>

    <!-- Generic Scribble Modal -->
    <div id="eventModal" class="scribble-modal-overlay">
        <div class="scribble-modal-content">
            <button class="modal-close-btn" onclick="closeModal()">×</button>
            <h2 id="modalTitle" class="modal-title">Event Title</h2>
            <div class="modal-details">
                <p id="modalDesc" class="modal-description">
                    Description goes here...
                </p>
                <div class="modal-meta">
                    <p>📅 <strong>Date:</strong> <span id="modalDate">Date</span></p>
                    <p>⏰ <strong>Time:</strong> <span id="modalTime">Time</span></p>
                    <p>📍 <strong>Venue:</strong> <span id="modalVenue">Venue</span></p>
                </div>
            </div>
            <a href="#" class="modal-cta" onclick="alert('Registered!'); closeModal();">Register Now</a>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <script>
        function openModal(title, desc, date, time, venue) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalDate').innerText = date;
            document.getElementById('modalTime').innerText = time;
            document.getElementById('modalVenue').innerText = venue;

            const modal = document.getElementById('eventModal');
            modal.style.display = 'flex';
            // Slight delay to allow display flex to apply before opacity transition
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('eventModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300); // Wait for transition
        }

        // Close on outside click
        document.getElementById('eventModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
    <script src="homepage.js"></script>
</body>

</html>
