<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFY - Feedback Form</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Chewy&display=swap" rel="stylesheet">

<body>
    <!-- Back to Home -->
    <a href="homepage.html" class="back-link" style="position: absolute; top: 30px; left: 30px; font-weight: 700; font-size: 1.2rem; color: #1e1e1e; text-decoration: none; z-index: 100; padding: 10px 20px; border: 3px solid #1e1e1e; border-radius: 15px; background: #FFF3B0; box-shadow: 4px 4px 0 #1e1e1e; transition: transform 0.2s; cursor: none;">← Back</a>

    <div class="doodles">

        <!-- Doodle 3: Heart -->

        <svg class="doodle doodle-4" width="70" height="70" viewBox="0 0 24 24" fill="#FFDAC1" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <!-- Doodle 5: Moon -->
        <svg class="doodle doodle-5" width="60" height="60" viewBox="0 0 24 24" fill="#C7CEEA" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <!-- Doodle 6: Flower -->
        <svg class="doodle doodle-6" width="65" height="65" viewBox="0 0 24 24" fill="#B5EAD7" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 16v5"></path><path d="M16 12h5"></path><path d="M12 8V3"></path><path d="M8 12H3"></path><path d="M14.83 14.83l3.53 3.54"></path><path d="M14.83 9.17l3.53-3.54"></path><path d="M9.17 9.17L5.64 5.64"></path><path d="M9.17 14.83l-3.53 3.54"></path></svg>

        <!-- Doodle 8: Sparkle -->
        <svg class="doodle doodle-8" width="45" height="45" viewBox="0 0 24 24" fill="#FFD93D" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path></svg>

        <svg class="doodle doodle-10" width="40" height="40" viewBox="0 0 24 24" fill="#C7CEEA" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        <!-- Doodle 11: Zigsag -->
        <svg class="doodle doodle-11" width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#6BCB77" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 4 14 20 20 10"></polyline></svg>
        <!-- Doodle 12: Balloon -->
        <svg class="doodle doodle-12" width="60" height="60" viewBox="0 0 24 24" fill="#FF9AA2" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><path d="M12 15v8"></path><path d="M10 15l2 2 2-2"></path></svg>
    </div>

    <div class="feedback-container">
        <div class="feedback-card">
            <div class="card-header">
                <h1>Feedback Form! 🖍️</h1>
                <p>We'd super-duper love to hear your thoughts! ✨</p>
            </div>

            <form action="#" method="POST" class="feedback-form">
                <div class="form-row">
                    <div class="column">
                        <label for="name">Name 🎈</label>
                        <input type="text" id="name" name="name" placeholder="Your awesome name!" required>
                    </div>
                    <div class="column">
                        <label for="event_name">Event Name 🎉</label>
                        <input type="text" id="event_name" name="event_name" placeholder="Which fun event?" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="column">
                        <label for="club">Club 🎨</label>
                        <input type="text" id="club" name="club" placeholder="Your club's name?" required>
                    </div>
                    <div class="column">
                        <label for="roll_number">Roll Number 🔢</label>
                        <input type="text" id="roll_number" name="roll_number" placeholder="e.g. 102203001" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="feedback">Feedback 💭</label>
                    <textarea id="feedback" name="feedback" rows="3"
                        placeholder="Tell us everything! We're all ears! 🐘" required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Submit Feedback! 🚀</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <script src="homepage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cursor = document.querySelector('.custom-cursor');
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('mouseenter', () => cursor.classList.add('cursor-write'));
                input.addEventListener('mouseleave', () => cursor.classList.remove('cursor-write'));
            });
            const btn = document.querySelector('.submit-btn');
            btn.addEventListener('mouseenter', () => cursor.classList.add('cursor-btn'));
            btn.addEventListener('mouseleave', () => cursor.classList.remove('cursor-btn'));
            const backLink = document.querySelector('.back-link');
            if (backLink) {
                backLink.addEventListener('mouseenter', () => cursor.classList.add('cursor-btn'));
                backLink.addEventListener('mouseleave', () => cursor.classList.remove('cursor-btn'));
            }
        });
        
        // Update cursor position
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>

</html>
