<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Unify - Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Background Doodles -->
    <div class="background-doodles">
        <div class="doodle spiral"></div>
        <div class="doodle heart"></div>
        <div class="doodle zigzag"></div>
        <div class="doodle moon"></div>

        <!-- Extra Cute Doodles -->
        <div class="doodle bulb"></div>
        <div class="doodle paw paw1"></div>
        <div class="doodle paw paw2"></div>
        <div class="doodle star star1"></div>
        <div class="doodle cloud"></div>
    </div>

    <!-- Back to Home -->
    <a href="index.html" class="back-link">← Back</a>

    <!-- Login Card -->
    <div class="card-container">
        <div class="login-card">
            <h1 class="heading">SIGN IN</h1>

            <form>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="actions">
                    <button class="btn-primary">Sign In</button>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
            </form>

            <div class="footer-link">
                Don’t have an account? <a href="home.html">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <script src="homepage.js"></script>
</body>

</html>
